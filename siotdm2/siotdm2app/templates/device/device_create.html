{% extends 'base.html' %}

{% block title %}Create Device{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Create New Device</h2>
            <form method="post">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <label for="{{ form.device_name.id_for_label }}">Device Name</label>
                    {{ form.device_name }}
                </div>
                <div class="form-group mb-3">
                    <label for="{{ form.device_type.id_for_label }}">Device Type</label>
                    {{ form.device_type }}
                </div>
                <div class="form-group mb-3">
                    <label for="{{ form.status.id_for_label }}">Status</label>
                    {{ form.status }}
                </div>
                {% if form.errors %}
                    <div class="alert alert-danger">
                        {{ form.errors }}
                    </div>
                {% endif %}
                <button type="submit" class="btn btn-primary">Create Device</button>
                <a href="{% url 'device_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
