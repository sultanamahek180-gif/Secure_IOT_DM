<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Organization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --void: #010508;
            --deep: #040d12;
            --bio-green: #00ff88;
            --bio-teal: #00e5c8;
            --bio-red: #ff3060;
            --border-bio: rgba(0, 255, 136, 0.15);
            --border-red: rgba(255, 48, 96, 0.2);
            --text-primary: #caf0e0;
            --text-muted: rgba(180, 220, 200, 0.35);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--void);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: none;
        }

        /* ── CURSOR ── */
        #cursor {
            position: fixed; top: 0; left: 0;
            width: 20px; height: 20px;
            pointer-events: none; z-index: 99999;
            transform: translate(-50%, -50%);
        }
        #cursor svg { width: 100%; height: 100%; animation: cursorSpin 4s linear infinite; }
        @keyframes cursorSpin { to { transform: rotate(360deg); } }

        #cursor-trail {
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 99998;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            border: 1px solid rgba(255, 48, 96, 0.25);
            border-radius: 50%;
            transition: left 0.15s ease, top 0.15s ease, width 0.3s, height 0.3s, border-color 0.3s;
        }
        body:has(a:hover) #cursor-trail,
        body:has(button:hover) #cursor-trail {
            width: 90px; height: 90px;
            border-color: var(--bio-red);
        }

        /* ── SCAN LINE ── */
        .scan-line {
            position: fixed; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--bio-red), transparent);
            z-index: 9999; pointer-events: none;
            animation: scanMove 8s linear infinite; opacity: 0.2;
        }
        @keyframes scanMove { 0% { top: -2px; } 100% { top: 100vh; } }

        /* ── BACKGROUND ── */
        .bg-grid {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                linear-gradient(rgba(0, 255, 136, .02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, .02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .page-orb {
            position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 0; filter: blur(80px);
            animation: orbDrift 18s ease-in-out infinite alternate;
        }
        .page-orb-1 {
            width: 460px; height: 460px;
            background: radial-gradient(circle, rgba(255, 48, 96, .1), transparent 70%);
            top: -150px; left: -120px;
        }
        .page-orb-2 {
            width: 360px; height: 360px;
            background: radial-gradient(circle, rgba(0, 229, 200, .06), transparent 70%);
            bottom: -90px; right: -80px;
            animation-delay: -10s; animation-direction: alternate-reverse;
        }
        @keyframes orbDrift {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(28px, 28px) scale(1.06); }
        }

        /* ── CARD ── */
        .container {
            max-width: 520px; width: 100%;
            background: rgba(4, 13, 18, .93);
            border: 1px solid var(--border-red);
            clip-path: polygon(20px 0%, 100% 0%, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            position: relative; z-index: 10; overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 48, 96, .06), 0 40px 100px rgba(0, 0, 0, .7);
            animation: cardIn .85s cubic-bezier(.22, 1, .36, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(.97); }
            to   { opacity: 1; transform: none; }
        }
        /* Red top accent */
        .container::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--bio-red), rgba(255, 48, 96, .5), transparent);
        }
        /* Corner decorations */
        .container::after {
            content: '';
            position: absolute; bottom: 8px; right: 8px;
            width: 14px; height: 14px;
            border-right: 1px solid rgba(255, 48, 96, .3);
            border-bottom: 1px solid rgba(255, 48, 96, .3);
        }
        .corner-tl {
            position: absolute; top: 8px; left: 8px;
            width: 14px; height: 14px;
            border-top: 1px solid rgba(255, 48, 96, .3);
            border-left: 1px solid rgba(255, 48, 96, .3);
            z-index: 1;
        }

        /* ── CARD HEADER ── */
        .card-header {
            background: rgba(255, 48, 96, .03);
            border-bottom: 1px solid var(--border-red);
            padding: 28px 36px;
            display: flex; align-items: center; gap: 18px;
            animation: fadeUp .6s ease .2s both;
        }

        .delete-icon {
            width: 52px; height: 52px; flex-shrink: 0;
            background: rgba(255, 48, 96, .06);
            border: 1px solid var(--border-red);
            clip-path: polygon(8px 0%, 100% 0%, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            display: grid; place-items: center;
            font-size: 1.1rem; color: var(--bio-red);
            position: relative;
            animation: iconPulse 2.5s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 48, 96, .3); }
            50%       { box-shadow: 0 0 20px rgba(255, 48, 96, .25); }
        }

        .header-meta { display: flex; flex-direction: column; gap: 6px; }

        .danger-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 3px 12px;
            font-family: 'Space Mono', monospace; font-size: .58rem;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--bio-red);
            border: 1px solid rgba(255, 48, 96, .25);
            background: rgba(255, 48, 96, .05);
            clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0 100%);
            width: fit-content;
        }
        .badge-dot {
            width: 5px; height: 5px;
            background: var(--bio-red); border-radius: 50%;
            box-shadow: 0 0 6px var(--bio-red);
            animation: blink 1s ease infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }

        .header-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem; font-weight: 700; letter-spacing: 1px;
            color: #fff; margin: 0;
        }

        /* ── CARD BODY ── */
        .card-body { padding: 28px 36px 32px; }

        /* ── WARNING STRIP ── */
        .warning {
            display: flex; align-items: flex-start; gap: 12px;
            background: rgba(255, 48, 96, .04);
            border: 1px solid rgba(255, 48, 96, .18);
            padding: 14px 18px; margin-bottom: 24px;
            clip-path: polygon(8px 0%, 100% 0%, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            animation: fadeUp .6s ease .35s both;
        }
        .warning i {
            color: var(--bio-red); font-size: .9rem;
            flex-shrink: 0; margin-top: 2px;
        }
        .warning span {
            font-family: 'Space Mono', monospace;
            font-size: .64rem; letter-spacing: .4px;
            color: rgba(255, 48, 96, .65); line-height: 1.7;
        }
        .warning span strong { color: var(--bio-red); font-weight: 400; }

        /* ── ORG DETAIL ROWS ── */
        .org-detail {
            background: rgba(255, 48, 96, .02);
            border: 1px solid rgba(255, 48, 96, .1);
            padding: 13px 18px; margin-bottom: 10px;
            clip-path: polygon(8px 0%, 100% 0%, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            display: flex; align-items: center; gap: 12px;
            animation: fadeUp .6s ease both;
        }
        .org-detail:nth-child(1) { animation-delay: .4s; }
        .org-detail:nth-child(2) { animation-delay: .48s; }

        .org-detail i {
            color: var(--bio-red); font-size: .85rem;
            opacity: .7; flex-shrink: 0;
        }
        .org-detail-label {
            font-family: 'Space Mono', monospace;
            font-size: .58rem; letter-spacing: 2px; text-transform: uppercase;
            color: var(--text-muted); min-width: 80px;
        }
        .org-detail-val {
            font-family: 'Rajdhani', sans-serif;
            font-size: .95rem; letter-spacing: .3px;
            color: var(--text-primary); font-weight: 500;
        }

        /* ── BUTTON GROUP ── */
        .button-group {
            display: flex; gap: 12px;
            margin-top: 28px; padding-top: 24px;
            border-top: 1px solid rgba(255, 48, 96, .1);
            animation: fadeUp .6s ease .55s both;
        }

        button, a {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 13px 32px;
            font-family: 'Orbitron', monospace; font-weight: 700;
            font-size: .72rem; letter-spacing: 1.5px; text-transform: uppercase;
            border: none; cursor: none; text-decoration: none;
            position: relative; overflow: hidden;
            transition: transform .3s, box-shadow .3s;
        }
        button::before, a::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
            opacity: 0; transition: opacity .3s;
        }
        button:hover::before, a:hover::before { opacity: 1; }
        button:hover, a:hover { transform: translateY(-2px); }

        .btn-delete {
            background: var(--bio-red); color: #fff;
            clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            box-shadow: 0 0 28px rgba(255, 48, 96, .25);
            flex: 1; justify-content: center;
        }
        .btn-delete:hover {
            box-shadow: 0 12px 40px rgba(255, 48, 96, .45);
            color: #fff;
        }

        .btn-cancel {
            background: transparent; color: var(--text-muted);
            border: 1px solid rgba(0, 255, 136, .12);
            clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            white-space: nowrap;
        }
        .btn-cancel:hover {
            border-color: rgba(0, 255, 136, .25);
            color: var(--bio-green);
            background: rgba(0, 255, 136, .04);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: none; }
        }

        @media (max-width: 768px) {
            #cursor, #cursor-trail { display: none; }
            body { cursor: auto; }
            * { cursor: auto !important; }
            .button-group { flex-direction: column; }
            button, a { justify-content: center; }
        }
        @media (max-width: 540px) {
            .card-header { padding: 22px 24px; }
            .card-body { padding: 24px 24px 28px; }
        }
    </style>
</head>
<body>

    <!-- Cursor -->
    <div id="cursor">
        <svg viewBox="0 0 20 20" fill="none">
            <polygon points="10,1 13,7 19,7 14.5,11 16.5,18 10,14 3.5,18 5.5,11 1,7 7,7"
                stroke="#ff3060" stroke-width="1.2" />
        </svg>
    </div>
    <div id="cursor-trail"></div>

    <div class="scan-line"></div>
    <div class="bg-grid"></div>
    <div class="page-orb page-orb-1"></div>
    <div class="page-orb page-orb-2"></div>

    <div class="container">
        <div class="corner-tl"></div>

        <!-- Header -->
        <div class="card-header">
            <div class="delete-icon">
                <i class="fa-solid fa-trash-can"></i>
            </div>
            <div class="header-meta">
                <div class="danger-badge">
                    <div class="badge-dot"></div>Danger Zone
                </div>
                <div class="header-title">Delete Organization</div>
            </div>
        </div>

        <div class="card-body">

            <!-- Warning — original text untouched -->
            <div class="warning">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span><strong>Warning!</strong> This action cannot be undone. All associated data will be permanently deleted.</span>
            </div>

            <!-- Org details — original variables untouched -->
            <div class="org-detail">
                <i class="fa-solid fa-building"></i>
                <span class="org-detail-label">Organization</span>
                <span class="org-detail-val">{{ org.org_name }}</span>
            </div>
            <div class="org-detail">
                <i class="fa-solid fa-envelope"></i>
                <span class="org-detail-label">Email</span>
                <span class="org-detail-val">{{ org.contact_email }}</span>
            </div>

            <!-- Form — original code untouched -->
            <form method="POST">
                {% csrf_token %}
                <div class="button-group">
                    <button type="submit" class="btn-delete">
                        <i class="fa-solid fa-trash-can"></i> Delete
                    </button>
                    <a href="{% url 'organization_list' %}" class="btn-cancel">
                        <i class="fa-solid fa-xmark"></i> Cancel
                    </a>
                </div>
            </form>

        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const trail  = document.getElementById('cursor-trail');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top  = e.clientY + 'px';
            trail.style.left  = e.clientX + 'px';
            trail.style.top   = e.clientY + 'px';
        });
    </script>

</body>
</html>
