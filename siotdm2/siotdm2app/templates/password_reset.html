<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #020509;
            --cyan: #00e5ff;
            --violet: #9c42ff;
            --rose: #ff2d6b;
            --lime: #aaff00;
            --text: #e8f0fe;
            --muted: #4a5568;
            --glass: rgba(11, 17, 32, 0.75);
            --border: rgba(0, 229, 255, 0.12);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        /* Grid */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 480px; height: 480px;
            background: radial-gradient(circle, rgba(0,229,255,.22), transparent 70%);
            top: -140px; right: -80px;
        }
        .orb-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(156,66,255,.26), transparent 70%);
            bottom: -100px; left: -80px;
            animation-delay: -10s;
        }
        @keyframes drift {
            0%   { transform: translate(0,0) scale(1); }
            100% { transform: translate(35px,35px) scale(1.08); }
        }

        /* ── CARD ── */
        .card-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: cardIn .85s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(36px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 36px 36px;
            backdrop-filter: blur(24px);
            box-shadow: 0 40px 100px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
            position: relative;
            overflow: hidden;
        }

        /* Top glow line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
        }

        /* ── HEADER ── */
        .card-header-custom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeUp .7s ease .2s both;
        }
        .card-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
            color: #000;
            animation: iconGlow 3s ease-in-out infinite;
        }
        @keyframes iconGlow {
            0%,100% { box-shadow: 0 0 24px rgba(0,229,255,.35); }
            50%      { box-shadow: 0 0 38px rgba(156,66,255,.5); }
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 50px;
            border: 1px solid rgba(0,229,255,.2);
            background: rgba(0,229,255,.04);
            font-size: .68rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--cyan);
            font-family: 'Syne', sans-serif;
        }
        .badge-dot {
            width: 5px; height: 5px;
            background: var(--lime);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--lime);
            animation: blink 1.5s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        .card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -.5px;
            text-align: center;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .card-hint {
            text-align: center;
            font-size: .83rem;
            color: #3d5166;
            margin-top: 6px;
            line-height: 1.5;
            animation: fadeUp .6s ease .3s both;
        }

        /* ── FORM ── */
        .mb-3 {
            margin-bottom: 20px;
            animation: fadeUp .6s ease .4s both;
        }

        .mb-3 label {
            display: block;
            font-size: .75rem;
            font-weight: 600;
            color: #6b7fa3;
            margin-bottom: 8px;
            letter-spacing: .5px;
            text-transform: uppercase;
            font-family: 'Syne', sans-serif;
        }

        .mb-3 input[type="email"],
        .mb-3 input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .93rem;
            outline: none;
            transition: border-color .3s, box-shadow .3s, background .3s;
            box-sizing: border-box;
        }
        .mb-3 input:focus {
            border-color: rgba(0,229,255,.4);
            background: rgba(0,229,255,.03);
            box-shadow: 0 0 0 3px rgba(0,229,255,.07);
        }
        .mb-3 input::placeholder { color: var(--muted); }

        /* ── BUTTON ── */
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .95rem;
            letter-spacing: .4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .3s, box-shadow .3s;
            box-shadow: 0 0 26px rgba(0,229,255,.22);
            animation: fadeUp .6s ease .5s both;
        }
        .btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.2), transparent);
            opacity: 0;
            transition: opacity .3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 36px rgba(0,229,255,.4);
        }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: translateY(0); }

        /* ── BACK LINK ── */
        .back-link {
            text-align: center;
            margin-top: 20px;
            animation: fadeUp .6s ease .6s both;
        }
        .back-link a {
            color: #4a6080;
            text-decoration: none;
            font-size: .83rem;
            transition: color .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .back-link a::after {
            content: '';
            position: absolute;
            left: 0; bottom: -2px;
            width: 0; height: 1px;
            background: linear-gradient(90deg, var(--cyan), var(--violet));
            transition: width .3s;
        }
        .back-link a:hover { color: var(--cyan); }
        .back-link a:hover::after { width: 100%; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card-wrap">
    <div class="col-md-6 mx-auto card p-4 shadow">

        <div class="card-header-custom">
            <div class="card-icon"><i class="fa-solid fa-key"></i></div>
            <div class="card-badge"><div class="badge-dot"></div>SecureIoT</div>
            <h3>Forgot Password</h3>
        </div>

        <p class="card-hint">Enter your email and we'll send you a reset link.</p>

        <form method="POST" style="margin-top:24px;">
            {% csrf_token %}

            <div class="mb-3">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-paper-plane"></i>&nbsp; Send Reset Link
            </button>
        </form>

        <div class="text-center mt-3 back-link">
            <a href="{% url 'login' %}"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>

    </div>
</div>

</body>
</html>
