<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Data Form</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        .container{
            width:500px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        input, textarea, select{
            padding:8px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        button{
            padding:10px;
            border:none;
            border-radius:4px;
            background:#007bff;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .cancel{
            text-align:center;
            margin-top:10px;
        }

        .cancel a{
            text-decoration:none;
            color:#555;
        }
    </style>
</head>
<body>

<div class="container">

<h2>Device Data</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Save</button>
</form>

<div class="cancel">
    <a href="{% url 'devicedata_list' device.device_id %}">
        Cancel
    </a>
</div>

</div>

</body>
</html>
