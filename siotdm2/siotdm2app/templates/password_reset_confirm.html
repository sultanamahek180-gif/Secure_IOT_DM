<!DOCTYPE html>
<html>
<head>
    <title>Set New Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #020509;
            --surface: #0b1120;
            --cyan: #00e5ff;
            --violet: #9c42ff;
            --lime: #aaff00;
            --rose: #ff2d6b;
            --text: #e8f0fe;
            --muted: #4a5568;
            --glass: rgba(11, 17, 32, 0.75);
            --border: rgba(0, 229, 255, 0.12);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        /* Grid */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(156,66,255,.26), transparent 70%);
            top: -160px; left: -100px;
        }
        .orb-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(0,229,255,.18), transparent 70%);
            bottom: -100px; right: -80px;
            animation-delay: -9s;
        }
        @keyframes drift {
            0%   { transform: translate(0,0) scale(1); }
            100% { transform: translate(38px,38px) scale(1.08); }
        }

        /* ── CARD WRAP ── */
        .card-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: cardIn .9s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(38px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── CARD — keeps Bootstrap class names ── */
        .card {
            background: var(--glass);
            border: 1px solid var(--border) !important;
            border-radius: 26px !important;
            padding: 44px 40px 40px !important;
            backdrop-filter: blur(24px);
            box-shadow: 0 40px 100px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05) !important;
            position: relative;
            overflow: hidden;
        }

        /* Top accent line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--violet), var(--cyan), transparent);
        }

        /* ── HEADER ── */
        .card-header-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeUp .7s ease .2s both;
        }

        .card-icon {
            width: 54px; height: 54px;
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-size: 1.25rem;
            color: #000;
            animation: iconGlow 3s ease-in-out infinite;
        }
        @keyframes iconGlow {
            0%,100% { box-shadow: 0 0 26px rgba(156,66,255,.4); }
            50%      { box-shadow: 0 0 40px rgba(0,229,255,.5); }
        }

        .card-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 50px;
            border: 1px solid rgba(156,66,255,.25);
            background: rgba(156,66,255,.05);
            font-size: .68rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--violet);
            font-family: 'Syne', sans-serif;
        }
        .badge-dot {
            width: 5px; height: 5px;
            background: var(--lime);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--lime);
            animation: blink 1.5s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        .card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -.5px;
            text-align: center;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        /* Strength hint bar area */
        .strength-hint {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .strength-bar {
            flex: 1; height: 3px;
            border-radius: 99px;
            background: rgba(255,255,255,.07);
            transition: background .3s;
        }

        /* ── MB-3 GROUPS — same Bootstrap class ── */
        .mb-3 {
            margin-bottom: 20px;
            animation: fadeUp .6s ease both;
        }
        .mb-3:nth-child(1) { animation-delay: .35s; }
        .mb-3:nth-child(2) { animation-delay: .45s; }

        .mb-3 label {
            display: block;
            font-size: .75rem;
            font-weight: 600;
            color: #6b7fa3;
            margin-bottom: 8px;
            letter-spacing: .5px;
            text-transform: uppercase;
            font-family: 'Syne', sans-serif;
        }

        .mb-3 input[type="password"],
        .mb-3 input[type="text"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: .93rem;
            outline: none;
            transition: border-color .3s, box-shadow .3s, background .3s;
            box-sizing: border-box;
        }
        .mb-3 input:focus {
            border-color: rgba(156,66,255,.45);
            background: rgba(156,66,255,.03);
            box-shadow: 0 0 0 3px rgba(156,66,255,.08);
        }
        .mb-3 input::placeholder { color: var(--muted); }

        /* ── ERROR LIST ── */
        .errorlist, ul.errorlist {
            list-style: none;
            padding: 0; margin: 0 0 8px;
            font-size: .78rem;
            color: var(--rose);
        }
        .errorlist li::before { content: '⚠ '; font-size: .7rem; }

        /* ── BUTTON — keeps Bootstrap btn class ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            background: linear-gradient(135deg, var(--violet), var(--cyan));
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .97rem;
            letter-spacing: .4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform .3s, box-shadow .3s;
            box-shadow: 0 0 28px rgba(156,66,255,.28);
            animation: fadeUp .6s ease .55s both;
            text-decoration: none;
        }
        .btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.2), transparent);
            opacity: 0;
            transition: opacity .3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(156,66,255,.45);
            color: #000;
        }
        .btn:hover::before { opacity: 1; }
        .btn:active { transform: translateY(0); }

        /* Password strength live feedback */
        .pw-strength-wrap {
            margin-top: 8px;
        }
        .pw-bars {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        .pw-bar {
            flex: 1; height: 3px;
            border-radius: 99px;
            background: rgba(255,255,255,.07);
            transition: background .4s;
        }
        .pw-label {
            font-size: .7rem;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            letter-spacing: .4px;
            transition: color .3s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card-wrap">
    <div class="col-md-6 mx-auto card p-4 shadow">

        <div class="card-header-area">
            <div class="card-icon"><i class="fa-solid fa-lock-open"></i></div>
            <div class="card-badge"><div class="badge-dot"></div>SecureIoT</div>
            <h3 class="text-center mb-3">Set New Password</h3>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                {{ form.new_password1.label_tag }}
                {{ form.new_password1 }}
                <!-- Live strength meter (purely visual, no logic change) -->
                <div class="pw-strength-wrap" id="strengthWrap" style="display:none;">
                    <div class="pw-bars">
                        <div class="pw-bar" id="bar1"></div>
                        <div class="pw-bar" id="bar2"></div>
                        <div class="pw-bar" id="bar3"></div>
                        <div class="pw-bar" id="bar4"></div>
                    </div>
                    <span class="pw-label" id="pwLabel"></span>
                </div>
            </div>

            <div class="mb-3">
                {{ form.new_password2.label_tag }}
                {{ form.new_password2 }}
            </div>

            <button type="submit" class="btn btn-success w-100">
                <i class="fa-solid fa-shield-check"></i> Reset Password
            </button>
        </form>

    </div>
</div>

<script>
    // Visual-only password strength meter
    const field = document.querySelector('[name="new_password1"]') ||
                  document.querySelector('input[type="password"]');

    if (field) {
        const wrap  = document.getElementById('strengthWrap');
        const label = document.getElementById('pwLabel');
        const bars  = [
            document.getElementById('bar1'),
            document.getElementById('bar2'),
            document.getElementById('bar3'),
            document.getElementById('bar4'),
        ];

        const levels = [
            { color: '#ff2d6b', text: 'Weak' },
            { color: '#ffaa00', text: 'Fair' },
            { color: '#aaff00', text: 'Good' },
            { color: '#00e5ff', text: 'Strong' },
        ];

        function score(pw) {
            let s = 0;
            if (pw.length >= 8)  s++;
            if (/[A-Z]/.test(pw)) s++;
            if (/[0-9]/.test(pw)) s++;
            if (/[^A-Za-z0-9]/.test(pw)) s++;
            return s;
        }

        field.addEventListener('input', () => {
            const pw = field.value;
            if (!pw) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';
            const s = score(pw);
            bars.forEach((b, i) => {
                b.style.background = i < s ? levels[s - 1].color : 'rgba(255,255,255,.07)';
                b.style.boxShadow  = i < s ? `0 0 6px ${levels[s-1].color}` : 'none';
            });
            label.textContent  = levels[s - 1]?.text || '';
            label.style.color  = levels[s - 1]?.color || 'var(--muted)';
        });
    }
</script>

</body>
</html>
